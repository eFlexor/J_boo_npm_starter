<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d6efd">
  <title>SalesChatGPT — Inventory</title>
  <style>
/* ============================================================
   SalesChatGPT — self-contained stylesheet (no external deps).
   A small Bootstrap-flavored design system + app styles.
   ============================================================ */

:root {
  --primary: #0d6efd;
  --success: #198754;
  --danger: #dc3545;
  --warning: #ffc107;
  --secondary: #6c757d;

  --body-bg: #ffffff;
  --body-color: #212529;
  --card-bg: #ffffff;
  --input-bg: #ffffff;
  --border: #dee2e6;
  --secondary-bg: #e9ecef;
  --secondary-color: #6c757d;

  --sidebar-w: 220px;
  --gx: 1.5rem;
  --gy: 0rem;
}

[data-bs-theme="dark"] {
  --body-bg: #1a1d21;
  --body-color: #e3e6e9;
  --card-bg: #24282e;
  --input-bg: #2b3036;
  --border: #3a4047;
  --secondary-bg: #2b3036;
  --secondary-color: #9aa3ad;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 1rem;
  line-height: 1.5;
  background: var(--body-bg);
  color: var(--body-color);
  overflow-x: hidden;
}

h1, h2, h3, h4, h5, h6 { margin: 0 0 .5rem; font-weight: 600; line-height: 1.25; }
h5, .h5 { font-size: 1.2rem; }
.h6 { font-size: 1rem; font-weight: 600; }
.lead { font-size: 1.1rem; font-weight: 300; }
small, .small { font-size: .85rem; }
p { margin: 0 0 1rem; }

/* ---------- grid ---------- */
.row { display: flex; flex-wrap: wrap; margin-right: calc(-.5 * var(--gx)); margin-left: calc(-.5 * var(--gx)); }
.row > * { padding-right: calc(.5 * var(--gx)); padding-left: calc(.5 * var(--gx)); margin-top: var(--gy); width: 100%; }
.g-1 { --gx: .25rem; --gy: .25rem; }
.g-2 { --gx: .5rem; --gy: .5rem; }
.g-3 { --gx: 1rem; --gy: 1rem; }
.col, .col-md { flex: 1 0 0%; width: auto; }
.col-auto { flex: 0 0 auto; width: auto; }
.col-6 { flex: 0 0 auto; width: 50%; }
.col-12 { flex: 0 0 auto; width: 100%; }
.col-md, .col-md-4, .col-md-6, .col-lg-3 { flex: 0 0 auto; width: 100%; }
@media (min-width: 768px) {
  .col-md { flex: 1 0 0%; width: auto; }
  .col-md-6 { width: 50%; }
  .col-md-4 { width: 33.3333%; }
}
@media (min-width: 992px) {
  .col-lg-3 { width: 25%; }
}

/* ---------- spacing utilities ---------- */
.m-0 { margin: 0 !important; }
.mb-0 { margin-bottom: 0 !important; }
.mb-1 { margin-bottom: .25rem; }
.mb-2 { margin-bottom: .5rem; }
.mb-3 { margin-bottom: 1rem; }
.mb-4 { margin-bottom: 1.5rem; }
.mb-5 { margin-bottom: 3rem; }
.mt-1 { margin-top: .25rem; }
.mt-2 { margin-top: .5rem; }
.me-1 { margin-right: .25rem; }
.me-2 { margin-right: .5rem; }
.ms-2 { margin-left: .5rem; }
.p-2 { padding: .5rem; }
.py-5 { padding-top: 3rem; padding-bottom: 3rem; }
.pb-3 { padding-bottom: 1rem; }

/* ---------- flex utilities ---------- */
.d-flex { display: flex; }
.d-inline-flex { display: inline-flex; }
.flex-wrap { flex-wrap: wrap; }
.flex-column { flex-direction: column; }
.align-items-center { align-items: center; }
.justify-content-between { justify-content: space-between; }
.gap-2 { gap: .5rem; }
.h-100 { height: 100%; }
.w-100 { width: 100%; }

/* ---------- text utilities ---------- */
.fw-semibold { font-weight: 600; }
.fw-bold { font-weight: 700; }
.text-center { text-align: center; }
.text-end { text-align: right; }
.text-secondary { color: var(--secondary-color); }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.border-bottom { border-bottom: 1px solid var(--border); }
.border-danger { border-color: var(--danger) !important; }

/* ---------- buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
  font-weight: 500; font-size: 1rem; line-height: 1.5; text-decoration: none;
  padding: .5rem .9rem; border: 1px solid transparent; border-radius: .5rem;
  cursor: pointer; background: transparent; color: var(--body-color); user-select: none;
}
.btn:hover { filter: brightness(.94); }
.btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
.btn-sm { padding: .25rem .55rem; font-size: .85rem; border-radius: .4rem; }
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.btn-secondary { background: var(--secondary); border-color: var(--secondary); color: #fff; }
.btn-outline-primary { border-color: var(--primary); color: var(--primary); }
.btn-outline-primary:hover { background: var(--primary); color: #fff; }
.btn-outline-secondary { border-color: var(--border); color: var(--body-color); }
.btn-outline-secondary:hover { background: var(--secondary-bg); }
.btn-outline-success { border-color: var(--success); color: var(--success); }
.btn-outline-success:hover { background: var(--success); color: #fff; }
.btn-outline-danger { border-color: var(--danger); color: var(--danger); }
.btn-outline-danger:hover { background: var(--danger); color: #fff; }
.btn-close {
  width: 1.6rem; height: 1.6rem; border: 0; border-radius: .4rem; padding: 0;
  background: transparent; color: var(--body-color); cursor: pointer; font-size: 1.1rem; line-height: 1;
}
.btn-close::before { content: "\00d7"; font-size: 1.4rem; }
.btn-close:hover { background: var(--secondary-bg); }

/* ---------- forms ---------- */
.form-label { display: inline-block; margin-bottom: .3rem; font-weight: 500; }
.form-control, .form-select {
  display: block; width: 100%; padding: .5rem .75rem; font-size: 1rem; line-height: 1.5;
  color: var(--body-color); background: var(--input-bg);
  border: 1px solid var(--border); border-radius: .5rem;
}
.form-control:focus, .form-select:focus {
  outline: 0; border-color: var(--primary); box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .25);
}
textarea.form-control { min-height: 5rem; }
.input-group { display: flex; }
.input-group > .form-control { border-top-right-radius: 0; border-bottom-right-radius: 0; }
.input-group > .btn { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.form-check { display: flex; align-items: center; gap: .5rem; }
.form-check-input { width: 1rem; height: 1rem; cursor: pointer; }
.form-switch .form-check-input {
  appearance: none; -webkit-appearance: none; width: 2.3rem; height: 1.25rem; border-radius: 1rem;
  background: var(--border); position: relative; transition: background .15s;
}
.form-switch .form-check-input::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 1rem; height: 1rem;
  border-radius: 50%; background: #fff; transition: left .15s;
}
.form-switch .form-check-input:checked { background: var(--primary); }
.form-switch .form-check-input:checked::after { left: calc(100% - 1.1rem); }
.form-check-label { cursor: pointer; }

/* ---------- cards ---------- */
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: .6rem; }
.card-body { padding: 1rem; }

/* ---------- table ---------- */
.table-responsive { overflow-x: auto; }
.table { width: 100%; border-collapse: collapse; color: var(--body-color); }
.table th, .table td { padding: .6rem .5rem; border-bottom: 1px solid var(--border); text-align: left; }
.table thead th { font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: var(--secondary-color); }
.table-hover tbody tr:hover { background: var(--secondary-bg); }
.align-middle td, .align-middle th { vertical-align: middle; }

/* ---------- badges ---------- */
.badge { display: inline-block; padding: .32em .55em; font-size: .72rem; font-weight: 600; line-height: 1; border-radius: .4rem; }
.text-bg-success { background: var(--success); color: #fff; }
.text-bg-primary { background: var(--primary); color: #fff; }
.text-bg-secondary { background: var(--secondary); color: #fff; }
.text-bg-warning { background: var(--warning); color: #000; }
.text-bg-dark { background: #000; color: #fff; }
.text-bg-light { background: var(--secondary-bg); color: var(--body-color); }

/* ---------- list group ---------- */
.list-group { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: .6rem; overflow: hidden; }
.list-group-item { padding: .75rem 1rem; background: var(--card-bg); border-bottom: 1px solid var(--border); }
.list-group-item:last-child { border-bottom: 0; }

/* ---------- alerts ---------- */
.alert { padding: .8rem 1rem; border-radius: .5rem; }
.alert-danger { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }

/* ---------- modal ---------- */
.modal { position: fixed; inset: 0; z-index: 1055; display: none; overflow-y: auto; }
.modal.show { display: block; }
.modal-dialog { position: relative; margin: 1.75rem auto; max-width: 500px; padding: 0 .5rem; }
.modal-lg { max-width: 800px; }
.modal-content { display: flex; flex-direction: column; background: var(--card-bg); border: 1px solid var(--border); border-radius: .6rem; box-shadow: 0 1rem 3rem rgba(0, 0, 0, .35); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-bottom: 1px solid var(--border); }
.modal-title { margin: 0; font-size: 1.2rem; }
.modal-body { padding: 1rem; }
.modal-dialog-scrollable .modal-body { max-height: 70vh; overflow-y: auto; }
.modal-footer { display: flex; justify-content: flex-end; gap: .5rem; padding: 1rem; border-top: 1px solid var(--border); }
.modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, .5); z-index: 1050; }
body.modal-open { overflow: hidden; }

/* ============================================================
   App-specific layout
   ============================================================ */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
  padding: 1rem .75rem; border-right: 1px solid var(--border);
  background: var(--body-bg); z-index: 1040; transition: transform .2s ease;
}
#content { margin-left: var(--sidebar-w); padding: 1rem 1.25rem 4rem; }
.brand { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: .5rem; margin-bottom: 1.25rem; }
.nav-btn {
  display: flex; align-items: center; gap: .6rem; width: 100%; border: 0; background: transparent;
  text-align: left; padding: .55rem .7rem; border-radius: .5rem; color: var(--body-color);
  font-weight: 500; font-size: 1rem; cursor: pointer; margin-bottom: .15rem;
}
.nav-btn:hover { background: var(--secondary-bg); }
.nav-btn.active { background: var(--primary); color: #fff; }
.nav-icon { font-size: 1.1rem; width: 1.4rem; text-align: center; }
#nav-toggle { display: none; }

.kpi .kpi-label { font-size: .8rem; color: var(--secondary-color); text-transform: uppercase; letter-spacing: .03em; }
.kpi .kpi-value { font-size: 1.55rem; font-weight: 700; line-height: 1.2; }
.kpi .kpi-sub { font-size: .8rem; color: var(--secondary-color); }

.thumb {
  height: 130px; background-size: cover; background-position: center;
  background-color: var(--secondary-bg); border-top-left-radius: .6rem; border-top-right-radius: .6rem;
}
.thumb-sm { width: 44px; height: 44px; border-radius: .4rem; background-size: cover; background-position: center; background-color: var(--secondary-bg); }
.item-card { cursor: pointer; }

.gallery-thumb { position: relative; width: 80px; height: 80px; background-size: cover; background-position: center; border-radius: .5rem; border: 2px solid transparent; background-color: var(--secondary-bg); }
.gallery-thumb.primary { border-color: var(--warning); }
.gallery-thumb .g-del, .gallery-thumb .g-star {
  position: absolute; border: 0; border-radius: 50%; width: 22px; height: 22px; line-height: 20px;
  padding: 0; font-size: .8rem; cursor: pointer;
}
.gallery-thumb .g-del { top: -8px; right: -8px; background: var(--danger); color: #fff; }
.gallery-thumb .g-star { bottom: -8px; right: -8px; background: var(--warning); color: #000; }

.app-toast {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%) translateY(2rem);
  background: #212529; color: #fff; padding: .6rem 1.1rem; border-radius: .6rem;
  opacity: 0; pointer-events: none; transition: all .2s ease; z-index: 2000; max-width: 90vw;
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.app-toast.success { background: var(--success); }
.app-toast.danger { background: var(--danger); }

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0, 0, 0, .3); }
  #content { margin-left: 0; padding-top: 3.75rem; }
  #nav-toggle { display: inline-flex; position: fixed; top: .6rem; left: .6rem; z-index: 1050; }
}

  </style>
</head>
<body>
  <button id="nav-toggle" class="btn btn-primary btn-sm">☰</button>
  <nav id="sidebar">
    <div class="brand">📦 SalesChatGPT</div>
    <button class="nav-btn" data-view="dashboard"><span class="nav-icon">📊</span> Dashboard</button>
    <button class="nav-btn" data-view="inventory"><span class="nav-icon">📋</span> Inventory</button>
    <button class="nav-btn" data-view="data"><span class="nav-icon">⇄</span> Import / Export</button>
    <button class="nav-btn" data-view="settings"><span class="nav-icon">⚙️</span> Settings</button>
  </nav>
  <main id="content"><div id="main"></div></main>
  <div class="modal fade" id="itemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="item-modal-title">Add item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"><form id="item-form"></form></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="save-item">Save</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="saleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Record sale — <span id="sale-item-title"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="sale-form" class="row g-3">
            <div class="col-6"><label class="form-label">Sale price</label><input id="s-price" type="number" step="0.01" min="0" class="form-control"></div>
            <div class="col-6"><label class="form-label">Fees</label><input id="s-fees" type="number" step="0.01" min="0" class="form-control" value="0"></div>
            <div class="col-6"><label class="form-label">Shipping</label><input id="s-shipping" type="number" step="0.01" min="0" class="form-control" value="0"></div>
            <div class="col-6"><label class="form-label">Marketplace</label>
              <select id="s-marketplace" class="form-select">
                <option>In person</option><option>Facebook</option><option>Kijiji</option>
                <option>Craigslist</option><option>eBay</option><option>Other</option>
              </select>
            </div>
            <div class="col-12 text-secondary small">Item cost: <span id="s-cost-display">$0.00</span></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="record-sale">Record sale</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="app-toast"></div>
  <script>
/*
 * core.js — Pure business logic for SalesChatGPT.
 * No DOM, no IndexedDB. Safe to unit-test in Node and reuse in the browser.
 */
(function (global) {
  'use strict';

  var CONDITIONS = ['New', 'Like New', 'Good', 'Fair', 'Poor'];
  var STATUSES = ['Available', 'Listed', 'Sold', 'Reserved', 'Archived'];

  var ITEM_FIELDS = [
    'sku', 'title', 'description', 'price', 'cost', 'quantity',
    'condition', 'status', 'category', 'brand', 'model_number',
    'serial_number', 'barcode', 'location', 'tags', 'notes'
  ];

  /** Build a zero-padded SKU, e.g. generateSku('SKU', 7) -> 'SKU0007'. */
  function generateSku(prefix, counter) {
    var p = (prefix == null || prefix === '') ? 'SKU' : String(prefix);
    var n = Math.max(0, parseInt(counter, 10) || 0);
    return p + String(n).padStart(4, '0');
  }

  /** Coerce a value to a non-negative number, returning fallback on failure. */
  function toNumber(value, fallback) {
    if (fallback === undefined) fallback = 0;
    if (value === '' || value == null) return fallback;
    var n = typeof value === 'number' ? value : parseFloat(String(value).replace(/[^0-9.\-]/g, ''));
    return isNaN(n) ? fallback : n;
  }

  /** Validate an item before persisting. Returns { valid, errors }. */
  function validateItem(item) {
    var errors = [];
    if (!item || typeof item !== 'object') {
      return { valid: false, errors: ['Item is missing.'] };
    }
    if (!item.title || String(item.title).trim() === '') {
      errors.push('Title is required.');
    }
    var price = toNumber(item.price, NaN);
    if (isNaN(price) || price < 0) errors.push('Price must be a positive number.');
    var cost = toNumber(item.cost, NaN);
    if (isNaN(cost) || cost < 0) errors.push('Cost must be a positive number.');
    var qty = parseInt(item.quantity, 10);
    if (isNaN(qty) || qty < 0) errors.push('Quantity must be zero or more.');
    if (item.condition && CONDITIONS.indexOf(item.condition) === -1) {
      errors.push('Unknown condition: ' + item.condition);
    }
    if (item.status && STATUSES.indexOf(item.status) === -1) {
      errors.push('Unknown status: ' + item.status);
    }
    return { valid: errors.length === 0, errors: errors };
  }

  /** Normalize raw form input into a clean item record. */
  function normalizeItem(raw) {
    var item = {};
    ITEM_FIELDS.forEach(function (f) { item[f] = raw[f]; });
    item.title = (raw.title || '').trim();
    item.price = toNumber(raw.price, 0);
    item.cost = toNumber(raw.cost, 0);
    item.quantity = Math.max(0, parseInt(raw.quantity, 10) || 0);
    item.condition = raw.condition || 'Good';
    item.status = raw.status || 'Available';
    // tags: accept array or comma-separated string, store as array
    if (Array.isArray(raw.tags)) {
      item.tags = raw.tags.filter(Boolean);
    } else if (typeof raw.tags === 'string') {
      item.tags = raw.tags.split(',').map(function (t) { return t.trim(); }).filter(Boolean);
    } else {
      item.tags = [];
    }
    return item;
  }

  /** Profit for a single sale given the item cost. */
  function computeProfit(sale, cost) {
    return toNumber(sale.sale_price) - toNumber(sale.fees) - toNumber(sale.shipping_cost) - toNumber(cost);
  }

  /** Case-insensitive full-text match across the searchable fields. */
  function itemMatchesQuery(item, query) {
    if (!query) return true;
    var q = String(query).toLowerCase();
    var haystack = [
      item.sku, item.title, item.description, item.brand,
      item.model_number, item.serial_number, item.barcode, item.category,
      Array.isArray(item.tags) ? item.tags.join(' ') : item.tags
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.indexOf(q) !== -1;
  }

  /** Filter + sort a list of items. */
  function filterItems(items, opts) {
    opts = opts || {};
    var out = items.filter(function (item) {
      if (!itemMatchesQuery(item, opts.query)) return false;
      if (opts.status && opts.status !== 'All' && item.status !== opts.status) return false;
      if (opts.category && opts.category !== 'All' && item.category !== opts.category) return false;
      return true;
    });
    var sort = opts.sort || 'newest';
    out.sort(function (a, b) {
      switch (sort) {
        case 'oldest': return (a.id || 0) - (b.id || 0);
        case 'title': return String(a.title).localeCompare(String(b.title));
        case 'price_high': return toNumber(b.price) - toNumber(a.price);
        case 'price_low': return toNumber(a.price) - toNumber(b.price);
        case 'newest':
        default: return (b.id || 0) - (a.id || 0);
      }
    });
    return out;
  }

  /** Dashboard KPIs derived from items + sales. */
  function computeKpis(items, sales) {
    sales = sales || [];
    var k = {
      totalItems: 0, totalValue: 0, totalCost: 0, potentialProfit: 0,
      available: 0, listed: 0, sold: 0, reserved: 0,
      revenue: 0, realizedProfit: 0, salesCount: sales.length
    };
    items.forEach(function (it) {
      if (it.status === 'Archived') return;
      var qty = parseInt(it.quantity, 10) || 0;
      k.totalItems += qty;
      k.totalValue += toNumber(it.price) * qty;
      k.totalCost += toNumber(it.cost) * qty;
      if (it.status === 'Available') k.available += 1;
      else if (it.status === 'Listed') k.listed += 1;
      else if (it.status === 'Sold') k.sold += 1;
      else if (it.status === 'Reserved') k.reserved += 1;
    });
    k.potentialProfit = k.totalValue - k.totalCost;
    sales.forEach(function (s) {
      k.revenue += toNumber(s.sale_price);
      k.realizedProfit += toNumber(s.profit);
    });
    return k;
  }

  /** Distinct, sorted category list from items. */
  function categoriesOf(items) {
    var seen = {};
    items.forEach(function (it) { if (it.category) seen[it.category] = true; });
    return Object.keys(seen).sort();
  }

  // ---- CSV ----

  function csvEscape(value) {
    if (value == null) return '';
    var s = String(value);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function toCSV(items) {
    var cols = ITEM_FIELDS.slice();
    var lines = [cols.join(',')];
    items.forEach(function (it) {
      lines.push(cols.map(function (c) {
        var v = it[c];
        if (c === 'tags' && Array.isArray(v)) v = v.join(', ');
        return csvEscape(v);

/*
 * db.js — IndexedDB persistence layer (browser only).
 * Stores: inventory, images, sales, meta. Promise-based API.
 */
(function (global) {
  'use strict';

  var DB_NAME = 'saleschatgpt';
  var DB_VERSION = 1;
  var _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function (e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('inventory')) {
          var inv = db.createObjectStore('inventory', { keyPath: 'id', autoIncrement: true });
          inv.createIndex('status', 'status', { unique: false });
          inv.createIndex('category', 'category', { unique: false });
          inv.createIndex('barcode', 'barcode', { unique: false });
        }
        if (!db.objectStoreNames.contains('images')) {
          var img = db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
          img.createIndex('inventoryId', 'inventoryId', { unique: false });
        }
        if (!db.objectStoreNames.contains('sales')) {
          var sale = db.createObjectStore('sales', { keyPath: 'id', autoIncrement: true });
          sale.createIndex('inventoryId', 'inventoryId', { unique: false });
        }
        if (!db.objectStoreNames.contains('meta')) {
          db.createObjectStore('meta', { keyPath: 'key' });
        }
      };
      req.onsuccess = function () { _db = req.result; resolve(_db); };
      req.onerror = function () { reject(req.error); };
    });
  }

  function tx(store, mode) {
    return open().then(function (db) {
      return db.transaction(store, mode).objectStore(store);
    });
  }

  function reqToPromise(request) {
    return new Promise(function (resolve, reject) {
      request.onsuccess = function () { resolve(request.result); };
      request.onerror = function () { reject(request.error); };
    });
  }

  function add(store, value) {
    return tx(store, 'readwrite').then(function (s) { return reqToPromise(s.add(value)); });
  }

  function put(store, value) {
    return tx(store, 'readwrite').then(function (s) { return reqToPromise(s.put(value)); });
  }

  function get(store, key) {
    return tx(store, 'readonly').then(function (s) { return reqToPromise(s.get(key)); });
  }

  function getAll(store) {
    return tx(store, 'readonly').then(function (s) { return reqToPromise(s.getAll()); });
  }

  function getAllByIndex(store, index, value) {
    return tx(store, 'readonly').then(function (s) {
      return reqToPromise(s.index(index).getAll(value));
    });
  }

  function remove(store, key) {
    return tx(store, 'readwrite').then(function (s) { return reqToPromise(s.delete(key)); });
  }

  function clear(store) {
    return tx(store, 'readwrite').then(function (s) { return reqToPromise(s.clear()); });
  }

  // ---- meta helpers ----
  function getMeta(key, fallback) {
    return get('meta', key).then(function (row) {
      return row && row.value !== undefined ? row.value : fallback;
    });
  }
  function setMeta(key, value) {
    return put('meta', { key: key, value: value });
  }

  var DB = {
    open: open,
    add: add,
    put: put,
    get: get,
    getAll: getAll,
    getAllByIndex: getAllByIndex,
    remove: remove,
    clear: clear,
    getMeta: getMeta,
    setMeta: setMeta
  };

  global.DB = DB;
})(typeof self !== 'undefined' ? self : this);

  <script>
/*
 * app.js — UI controller for SalesChatGPT (browser only).
 * Depends on Core (core.js), DB (db.js), and Bootstrap 5.
 */
(function () {
  'use strict';

  var state = {
    items: [],
    sales: [],
    view: 'dashboard',
    query: '',
    status: 'All',
    category: 'All',
    sort: 'newest',
    cardMode: false,
    editing: null,           // item being edited in the modal
    editingImages: []        // images staged for the modal session
  };

  var els = {};
  var modal = null;
  var saleModal = null;

  // ---------- minimal modal (no framework dependency) ----------
  function Modal(el) { this.el = el; }
  Modal.openCount = 0;
  Modal.prototype.show = function () {
    if (this.el.classList.contains('show')) return;
    this.el.classList.add('show');
    this.el.setAttribute('aria-hidden', 'false');
    Modal.openCount++;
    document.body.classList.add('modal-open');
    if (!document.querySelector('.modal-backdrop')) {
      var bd = document.createElement('div');
      bd.className = 'modal-backdrop';
      document.body.appendChild(bd);
    }
  };
  Modal.prototype.hide = function () {
    if (!this.el.classList.contains('show')) return;
    this.el.classList.remove('show');
    this.el.setAttribute('aria-hidden', 'true');
    Modal.openCount = Math.max(0, Modal.openCount - 1);
    if (Modal.openCount === 0) {
      document.body.classList.remove('modal-open');
      var bd = document.querySelector('.modal-backdrop');
      if (bd) bd.remove();
    }
  };
  function hideAllModals() {
    $all('.modal.show').forEach(function (m) { new Modal(m).hide(); });
  }

  // ---------- helpers ----------
  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function money(n) {
    return '$' + (Core.toNumber(n)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function toast(message, kind) {
    var t = $('#toast');
    t.className = 'app-toast ' + (kind || 'info') + ' show';
    t.textContent = message;
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { t.className = 'app-toast'; }, 2600);
  }

  function statusBadge(status) {
    var map = {
      Available: 'success', Listed: 'primary', Sold: 'secondary',
      Reserved: 'warning', Archived: 'dark'
    };
    return '<span class="badge text-bg-' + (map[status] || 'light') + '">' + esc(status) + '</span>';
  }

  // ---------- data loading ----------
  function loadAll() {
    return Promise.all([DB.getAll('inventory'), DB.getAll('sales')]).then(function (res) {
      state.items = res[0] || [];
      state.sales = res[1] || [];
    });
  }

  function primaryImageFor(itemId) {
    return DB.getAllByIndex('images', 'inventoryId', itemId).then(function (imgs) {
      if (!imgs.length) return null;
      var prim = imgs.filter(function (i) { return i.isPrimary; })[0];
      return (prim || imgs.sort(function (a, b) { return a.sortOrder - b.sortOrder; })[0]).dataUrl;
    });
  }

  // ---------- image processing ----------
  // Downscale to <= maxEdge and re-encode as JPEG to keep storage small.
  function fileToDataUrl(file, maxEdge) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var w = img.width, h = img.height;
          var scale = Math.min(1, maxEdge / Math.max(w, h));
          var cw = Math.round(w * scale), ch = Math.round(h * scale);
          var canvas = document.createElement('canvas');
          canvas.width = cw; canvas.height = ch;
          canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- rendering ----------
  function render() {
    $all('[data-view]').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-view') === state.view);
    });
    if (state.view === 'dashboard') renderDashboard();
    else if (state.view === 'inventory') renderInventory();
    else if (state.view === 'data') renderData();
    else if (state.view === 'settings') renderSettings();
  }

  function kpiCard(label, value, sub) {
    return '<div class="col-6 col-lg-3"><div class="kpi card h-100"><div class="card-body">' +
      '<div class="kpi-label">' + esc(label) + '</div>' +
      '<div class="kpi-value">' + value + '</div>' +
      (sub ? '<div class="kpi-sub">' + sub + '</div>' : '') +
      '</div></div></div>';
  }

  function renderDashboard() {
    var k = Core.computeKpis(state.items, state.sales);
    var html = '<div class="row g-3 mb-4">' +
      kpiCard('Inventory Value', money(k.totalValue), k.totalItems + ' units in stock') +
      kpiCard('Potential Profit', money(k.potentialProfit), 'Cost basis ' + money(k.totalCost)) +
      kpiCard('Revenue (all time)', money(k.revenue), k.salesCount + ' sales') +
      kpiCard('Realized Profit', money(k.realizedProfit), '') +
      '</div>' +
      '<div class="row g-3 mb-4">' +
      kpiCard('Available', k.available, '') +
      kpiCard('Listed', k.listed, '') +
      kpiCard('Sold', k.sold, '') +
      kpiCard('Reserved', k.reserved, '') +
      '</div>';

    var recent = Core.filterItems(state.items, { sort: 'newest' }).slice(0, 6);
    html += '<h5 class="mb-3">Recent items</h5>';
    if (!recent.length) {
      html += emptyState('No items yet', 'Add your first item from the Inventory tab.');
    } else {
      html += '<div class="list-group">' + recent.map(function (it) {
        return '<div class="list-group-item d-flex justify-content-between align-items-center">' +
          '<div><div class="fw-semibold">' + esc(it.title) + '</div>' +
          '<small class="text-secondary">' + esc(it.sku) + ' · ' + esc(it.category || 'Uncategorized') + '</small></div>' +
          '<div class="text-end">' + statusBadge(it.status) + '<div class="fw-semibold mt-1">' + money(it.price) + '</div></div>' +
          '</div>';
      }).join('') + '</div>';
    }
    els.main.innerHTML = html;
  }

  function emptyState(title, sub) {
    return '<div class="text-center text-secondary py-5">' +
      '<div style="font-size:2.5rem">📦</div>' +
      '<div class="h6 mt-2">' + esc(title) + '</div>' +
      '<div>' + esc(sub) + '</div></div>';
  }

  function renderInventory() {
    var cats = Core.categoriesOf(state.items);
    var toolbar = '<div class="row g-2 align-items-center mb-3">' +
      '<div class="col-12 col-md"><input id="search" class="form-control" placeholder="Search title, SKU, brand, serial…" value="' + esc(state.query) + '"></div>' +
      '<div class="col-auto"><select id="f-status" class="form-select">' +
        ['All'].concat(Core.STATUSES).map(function (s) {
          return '<option' + (s === state.status ? ' selected' : '') + '>' + s + '</option>';
        }).join('') + '</select></div>' +
      '<div class="col-auto"><select id="f-cat" class="form-select"><option>All</option>' +
        cats.map(function (c) { return '<option' + (c === state.category ? ' selected' : '') + '>' + esc(c) + '</option>'; }).join('') +
        '</select></div>' +
      '<div class="col-auto"><select id="f-sort" class="form-select">' +
        [['newest', 'Newest'], ['oldest', 'Oldest'], ['title', 'Title A–Z'], ['price_high', 'Price high→low'], ['price_low', 'Price low→high']]
          .map(function (o) { return '<option value="' + o[0] + '"' + (o[0] === state.sort ? ' selected' : '') + '>' + o[1] + '</option>'; }).join('') +
        '</select></div>' +
      '<div class="col-auto"><button id="toggle-cards" class="btn btn-outline-secondary" title="Toggle view">' + (state.cardMode ? '☷' : '☰') + '</button></div>' +
      '<div class="col-auto"><button id="add-item" class="btn btn-primary">+ Add item</button></div>' +
      '</div>';

    var filtered = Core.filterItems(state.items, state);
    els.main.innerHTML = toolbar + '<div id="inv-body"></div>';

    var body = $('#inv-body');
    if (!filtered.length) {
      body.innerHTML = emptyState('Nothing matches', state.items.length ? 'Try clearing filters.' : 'Add your first item to get started.');
      return;
    }

    if (state.cardMode) {
      body.innerHTML = '<div class="row g-3">' + filtered.map(function (it) {
        return '<div class="col-6 col-md-4 col-lg-3"><div class="card h-100 item-card" data-id="' + it.id + '">' +
          '<div class="card-img-top thumb" data-thumb="' + it.id + '"></div>' +
          '<div class="card-body p-2">' +
          '<div class="small fw-semibold text-truncate">' + esc(it.title) + '</div>' +
          '<div class="d-flex justify-content-between align-items-center mt-1">' +
          '<span class="fw-semibold">' + money(it.price) + '</span>' + statusBadge(it.status) + '</div>' +
          '</div></div></div>';
      }).join('') + '</div>';
    } else {
      body.innerHTML = '<div class="table-responsive"><table class="table table-hover align-middle">' +
        '<thead><tr><th></th><th>SKU</th><th>Title</th><th>Brand</th><th class="text-end">Price</th><th>Status</th><th></th></tr></thead><tbody>' +
        filtered.map(function (it) {
          return '<tr data-id="' + it.id + '">' +
            '<td><div class="thumb-sm" data-thumb="' + it.id + '"></div></td>' +
            '<td class="text-secondary small">' + esc(it.sku) + '</td>' +
            '<td class="fw-semibold item-open" role="button">' + esc(it.title) + '</td>' +
            '<td class="small">' + esc(it.brand || '') + '</td>' +
            '<td class="text-end">' + money(it.price) + '</td>' +
            '<td>' + statusBadge(it.status) + '</td>' +
            '<td class="text-end"><button class="btn btn-sm btn-outline-secondary me-1 item-edit">Edit</button>' +
            (it.status !== 'Sold' ? '<button class="btn btn-sm btn-outline-success item-sell">Sell</button>' : '') +
            '</td></tr>';
        }).join('') + '</tbody></table></div>';
    }
    // lazy-load thumbnails
    $all('[data-thumb]').forEach(function (el) {
      primaryImageFor(parseInt(el.getAttribute('data-thumb'), 10)).then(function (url) {
        if (url) { el.style.backgroundImage = 'url(' + url + ')'; el.classList.add('has-img'); }
      });
    });
  }

  function renderData() {
    els.main.innerHTML =
      '<div class="row g-3"><div class="col-md-6"><div class="card"><div class="card-body">' +
      '<h5>Export</h5><p class="text-secondary small">Back up everything or share between devices.</p>' +
      '<button id="exp-json" class="btn btn-primary me-2">Backup (JSON)</button>' +
      '<button id="exp-csv" class="btn btn-outline-secondary">Export CSV</button>' +
      '</div></div></div>' +
      '<div class="col-md-6"><div class="card"><div class="card-body">' +
      '<h5>Import</h5><p class="text-secondary small">Restore a JSON backup, or import a CSV of items.</p>' +
      '<label class="btn btn-outline-primary me-2 mb-0">Restore JSON<input id="imp-json" type="file" accept="application/json" hidden></label>' +
      '<label class="btn btn-outline-secondary mb-0">Import CSV<input id="imp-csv" type="file" accept=".csv,text/csv" hidden></label>' +
      '</div></div></div></div>';
  }

  function renderSettings() {
    Promise.all([DB.getMeta('skuPrefix', 'SKU'), DB.getMeta('theme', 'light')]).then(function (r) {
      var prefix = r[0], theme = r[1];
      els.main.innerHTML =

        '<h5>Appearance</h5>' +

        '</div></div>' +
        '<div class="card mb-3"><div class="card-body">' +
        '<h5>SKU prefix</h5><div class="input-group" style="max-width:280px">' +

        '</div></div>' +
        '<div class="card border-danger"><div class="card-body">' +
        '<h5 class="text-danger">Danger zone</h5>' +

        '<button id="wipe" class="btn btn-outline-danger">Erase all data</button>' +

  // ---------- item modal ----------
  function openItemModal(item) {

        '<input id="m-' + id + '" class="form-control" type="' + (type || 'text') + '" value="' + esc(value == null ? '' : value) + '" ' + (attrs || '') + '></div>';
    };

      return '<div class="col-md-6"><label class="form-label">' + label + '</label><select id="m-' + id + '" class="form-select">' +

      field('quantity', 'Quantity', data.quantity == null ? 1 : data.quantity, 'number', 'min="0"') +
      select('condition', 'Condition', Core.CONDITIONS, data.condition) +
      select('status', 'Status', Core.STATUSES, data.status) +
      field('category', 'Category', data.category) +
      field('brand', 'Brand', data.brand) +
      field('model_number', 'Model #', data.model_number) +
      field('serial_number', 'Serial #', data.serial_number) +
      field('barcode', 'Barcode', data.barcode) +
      field('location', 'Location', data.location) +
      field('tags', 'Tags (comma separated)', Array.isArray(data.tags) ? data.tags.join(', ') : (data.tags || '')) +
      '<div class="col-12"><label class="form-label">Description</label><textarea id="m-description" class="form-control" rows="3">' + esc(data.description || '') + '</textarea></div>' +
      '<div class="col-12"><label class="form-label">Photos</label>' +
      '<input id="m-images" type="file" accept="image/*" multiple class="form-control mb-2">' +
      '<div id="m-gallery" class="d-flex flex-wrap gap-2"></div></div>' +
      '</div>';

    state.editingImages = [];
    if (item) {
      DB.getAllByIndex('images', 'inventoryId', item.id).then(function (imgs) {
        state.editingImages = imgs.sort(function (a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });
        renderGallery();
      });
    } else {
      renderGallery();
    }
    modal.show();
  }

  function renderGallery() {
    var g = $('#m-gallery');
    if (!g) return;
    g.innerHTML = state.editingImages.map(function (img, idx) {
      return '<div class="gallery-thumb' + (img.isPrimary ? ' primary' : '') + '" data-idx="' + idx + '" style="background-image:url(' + img.dataUrl + ')">' +
        '<button type="button" class="g-del" data-idx="' + idx + '" title="Remove">×</button>' +
        '<button type="button" class="g-star" data-idx="' + idx + '" title="Make primary">★</button>' +
        '</div>';
    }).join('');
  }

  function saveItem() {
    var raw = {};
    Core.ITEM_FIELDS.forEach(function (f) {
      var el = $('#m-' + f);
      if (el) raw[f] = el.value;
    });
    var item = Core.normalizeItem(raw);
    var check = Core.validateItem(item);
    if (!check.valid) { toast(check.errors[0], 'danger'); return; }

    var existing = state.editing;
    var savePromise;
    if (existing) {
      item.id = existing.id;
      item.sku = existing.sku;
      item.date_created = existing.date_created;
      item.date_modified = new Date().toISOString();
      savePromise = DB.put('inventory', item).then(function () { return existing.id; });
    } else {
      savePromise = DB.getMeta('skuCounter', 0).then(function (counter) {
        var next = (parseInt(counter, 10) || 0) + 1;
        return DB.getMeta('skuPrefix', 'SKU').then(function (prefix) {
          item.sku = Core.generateSku(prefix, next);
          item.date_created = new Date().toISOString();
          item.date_modified = item.date_created;
          return DB.add('inventory', item).then(function (id) {
            return DB.setMeta('skuCounter', next).then(function () { return id; });
          });
        });
      });
    }

    savePromise.then(function (itemId) {
      // persist staged images
      var ops = state.editingImages.map(function (img, idx) {
        var record = { inventoryId: itemId, dataUrl: img.dataUrl, isPrimary: !!img.isPrimary, sortOrder: idx, name: img.name || '' };
        if (img.id) { record.id = img.id; return DB.put('images', record); }
        return DB.add('images', record);
      });
      // delete removed images
      if (existing) {
        ops.push(DB.getAllByIndex('images', 'inventoryId', itemId).then(function (current) {
          var keep = {};
          state.editingImages.forEach(function (i) { if (i.id) keep[i.id] = true; });
          return Promise.all(current.filter(function (c) { return !keep[c.id]; })
            .map(function (c) { return DB.remove('images', c.id); }));
        }));
      }
      return Promise.all(ops);
    }).then(function () {
      modal.hide();
      toast(existing ? 'Item updated' : 'Item added', 'success');
      return loadAll();
    }).then(render).catch(function (e) {
      console.error(e); toast('Save failed: ' + e.message, 'danger');
    });
  }

  // ---------- sale modal ----------
  function openSaleModal(item) {
    state.sellingItem = item;
    $('#sale-item-title').textContent = item.title;
    $('#sale-form').reset();
    $('#s-price').value = item.price || '';
    $('#s-cost-display').textContent = money(item.cost);
    saleModal.show();
  }

  function recordSale() {
    var item = state.sellingItem;
    var sale = {
      inventoryId: item.id,
      sale_price: Core.toNumber($('#s-price').value),
      fees: Core.toNumber($('#s-fees').value),
      shipping_cost: Core.toNumber($('#s-shipping').value),
      marketplace: $('#s-marketplace').value,
      sale_date: new Date().toISOString()
    };
    sale.profit = Core.computeProfit(sale, item.cost);
    DB.add('sales', sale).then(function () {
      item.status = 'Sold';
      item.date_modified = new Date().toISOString();
      return DB.put('inventory', item);
    }).then(function () {
      saleModal.hide();
      toast('Sale recorded · profit ' + money(sale.profit), 'success');
      return loadAll();
    }).then(render).catch(function (e) { toast('Failed: ' + e.message, 'danger'); });
  }

  // ---------- import / export ----------
  function download(filename, text, mime) {
    var blob = new Blob([text], { type: mime || 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function exportJson() {
    Promise.all([DB.getAll('inventory'), DB.getAll('images'), DB.getAll('sales'), DB.getAll('meta')])
      .then(function (r) {
        var dump = { version: 1, exportedAt: new Date().toISOString(), inventory: r[0], images: r[1], sales: r[2], meta: r[3] };
        download('saleschatgpt-backup-' + new Date().toISOString().slice(0, 10) + '.json', JSON.stringify(dump), 'application/json');
        toast('Backup downloaded', 'success');
      });
  }

  function importJson(file) {
    var reader = new FileReader();
    reader.onload = function () {
      var data;
      try { data = JSON.parse(reader.result); } catch (e) { toast('Invalid JSON file', 'danger'); return; }
      Promise.all(['inventory', 'images', 'sales', 'meta'].map(function (s) { return DB.clear(s); }))
        .then(function () {
          var ops = [];
          (data.inventory || []).forEach(function (x) { ops.push(DB.put('inventory', x)); });
          (data.images || []).forEach(function (x) { ops.push(DB.put('images', x)); });
          (data.sales || []).forEach(function (x) { ops.push(DB.put('sales', x)); });
          (data.meta || []).forEach(function (x) { ops.push(DB.put('meta', x)); });
          return Promise.all(ops);
        })
        .then(loadAll).then(function () { toast('Backup restored', 'success'); applyTheme(); render(); })
        .catch(function (e) { toast('Restore failed: ' + e.message, 'danger'); });
    };
    reader.readAsText(file);
  }

  function importCsv(file) {
    var reader = new FileReader();
    reader.onload = function () {
      var rows = Core.fromCSV(reader.result);
      if (!rows.length) { toast('No rows found in CSV', 'danger'); return; }
      DB.getMeta('skuCounter', 0).then(function (counter) {
        return DB.getMeta('skuPrefix', 'SKU').then(function (prefix) {
          var n = parseInt(counter, 10) || 0;
          var ops = rows.map(function (item) {
            if (!item.sku) { n += 1; item.sku = Core.generateSku(prefix, n); }
            item.date_created = new Date().toISOString();
            item.date_modified = item.date_created;
            return DB.add('inventory', item);
          });
          return Promise.all(ops).then(function () { return DB.setMeta('skuCounter', n); });
        });
      }).then(loadAll).then(function () { toast('Imported ' + rows.length + ' items', 'success'); render(); })
        .catch(function (e) { toast('Import failed: ' + e.message, 'danger'); });
    };
    reader.readAsText(file);
  }

  // ---------- theme ----------
  function applyTheme() {
    DB.getMeta('theme', 'light').then(function (theme) {
      document.documentElement.setAttribute('data-bs-theme', theme);
    });
  }

  // ---------- events ----------
  function bindGlobalEvents() {
    // close modal via close button / dismiss / backdrop
    document.addEventListener('click', function (e) {
      if (e.target.classList.contains('modal-backdrop') ||
          e.target.closest('[data-bs-dismiss="modal"]') ||
          e.target.classList.contains('btn-close')) {
        hideAllModals();
      }
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') hideAllModals();
    });

    document.body.addEventListener('click', function (e) {
      var viewBtn = e.target.closest('[data-view]');
      if (viewBtn) { state.view = viewBtn.getAttribute('data-view'); closeNav(); render(); return; }

      if (e.target.id === 'add-item') { openItemModal(null); return; }
      if (e.target.id === 'toggle-cards') { state.cardMode = !state.cardMode; render(); return; }
      if (e.target.id === 'save-item') { saveItem(); return; }
      if (e.target.id === 'record-sale') { recordSale(); return; }
      if (e.target.id === 'exp-json') { exportJson(); return; }
      if (e.target.id === 'exp-csv') { download('inventory.csv', Core.toCSV(state.items), 'text/csv'); return; }

      // row / card actions
      var row = e.target.closest('[data-id]');
      if (row) {
        var id = parseInt(row.getAttribute('data-id'), 10);
        var item = state.items.filter(function (x) { return x.id === id; })[0];
        if (!item) return;
        if (e.target.classList.contains('item-edit') || e.target.classList.contains('item-open') || e.target.closest('.item-card')) {
          openItemModal(item); return;
        }
        if (e.target.classList.contains('item-sell')) { openSaleModal(item); return; }
      }

      // gallery actions
      if (e.target.classList.contains('g-del')) {
        state.editingImages.splice(parseInt(e.target.getAttribute('data-idx'), 10), 1);
        renderGallery(); return;
      }
      if (e.target.classList.contains('g-star')) {
        var gi = parseInt(e.target.getAttribute('data-idx'), 10);
        state.editingImages.forEach(function (im, i) { im.isPrimary = (i === gi); });
        renderGallery(); return;
      }

      if (e.target.id === 'save-prefix') {
        DB.setMeta('skuPrefix', $('#sku-prefix').value.trim() || 'SKU').then(function () { toast('Saved', 'success'); });
        return;
      }
      if (e.target.id === 'wipe') {
        if (confirm('Erase ALL data on this device? This cannot be undone.')) {
          Promise.all(['inventory', 'images', 'sales', 'meta'].map(function (s) { return DB.clear(s); }))
            .then(loadAll).then(function () { toast('All data erased', 'success'); applyTheme(); render(); });
        }
        return;
      }
      if (e.target.id === 'nav-toggle') { toggleNav(); return; }
    });

    document.body.addEventListener('change', function (e) {
      if (e.target.id === 'f-status') { state.status = e.target.value; render(); }
      else if (e.target.id === 'f-cat') { state.category = e.target.value; render(); }
      else if (e.target.id === 'f-sort') { state.sort = e.target.value; render(); }
      else if (e.target.id === 'dark-toggle') {
        DB.setMeta('theme', e.target.checked ? 'dark' : 'light').then(applyTheme);
      } else if (e.target.id === 'm-images') {
        var files = Array.prototype.slice.call(e.target.files);
        Promise.all(files.map(function (f) { return fileToDataUrl(f, 1280).then(function (url) { return { dataUrl: url, name: f.name }; }); }))
          .then(function (imgs) {
            if (!state.editingImages.length && imgs.length) imgs[0].isPrimary = true;
            state.editingImages = state.editingImages.concat(imgs);
            renderGallery();
          });
        e.target.value = '';
      } else if (e.target.id === 'imp-json' && e.target.files[0]) { importJson(e.target.files[0]); e.target.value = ''; }
      else if (e.target.id === 'imp-csv' && e.target.files[0]) { importCsv(e.target.files[0]); e.target.value = ''; }
    });

    document.body.addEventListener('input', function (e) {
      if (e.target.id === 'search') {
        state.query = e.target.value;
        // re-render only the body to keep focus in the search box
        var filtered = Core.filterItems(state.items, state);
        renderInventoryBody(filtered);
      }
    });
  }

  // Re-render just the inventory results (used during live search so the input keeps focus).
  function renderInventoryBody(filtered) {
    var prevView = state.view;
    state.view = 'inventory';
    var body = $('#inv-body');
    if (!body) { render(); return; }
    // reuse renderInventory's body builder by toggling content
    var saved = state.query;
    // Simplest: call renderInventory then restore focus
    renderInventory();
    var s = $('#search');
    if (s) { s.focus(); s.value = saved; s.setSelectionRange(saved.length, saved.length); }
    state.view = prevView === 'inventory' ? 'inventory' : prevView;
  }

  // ---------- mobile nav ----------
  function toggleNav() { $('#sidebar').classList.toggle('open'); }
  function closeNav() { $('#sidebar').classList.remove('open'); }

  // ---------- boot ----------
  function init() {
    els.main = $('#main');
    modal = new Modal($('#itemModal'));
    saleModal = new Modal($('#saleModal'));
    bindGlobalEvents();
    applyTheme();
    loadAll().then(render).catch(function (e) {
      console.error(e);
      els.main.innerHTML = '<div class="alert alert-danger">Failed to open local database: ' + esc(e.message) + '</div>';
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline support optional */ });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

  </script>
</body>
</html>
