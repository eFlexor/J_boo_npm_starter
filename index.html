<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AAAA Sales Inventory</title>

  <!-- Bootstrap 5.3.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- App styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-dark px-3 py-2">
  <span class="navbar-brand mb-0 h1 fs-5 fw-bold">
    <span>AAAA</span> Sales Inventory
  </span>
  <span id="itemCount" class="text-white-50 small"></span>
</nav>

<!-- ===== Toolbar ===== -->
<div class="toolbar px-3 py-2 d-flex flex-wrap gap-2 align-items-center">
  <button id="btnNew" class="btn btn-brand btn-sm">
    <i class="bi bi-plus-lg me-1"></i>New Item
    <span class="text-white-50 ms-1 small d-none d-md-inline">Ctrl+N</span>
  </button>

  <div class="input-group input-group-sm" style="max-width:240px">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input type="text" id="searchInput" class="form-control" placeholder="Search… Ctrl+F">
  </div>

  <div class="ms-auto d-flex flex-wrap gap-2">
    <button id="btnImportCSV" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-upload me-1"></i>Import CSV
    </button>
    <input type="file" id="csvInput" accept=".csv" class="d-none">

    <button id="btnExportCSV" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-download me-1"></i>Export CSV
    </button>

    <div class="dropdown">
      <button class="btn btn-outline-primary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
        <i class="bi bi-box-arrow-up me-1"></i>Marketplace
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li>
          <button class="dropdown-item" id="btnExportZip">
            <i class="bi bi-file-zip me-2"></i>Download ZIP (all formats)
          </button>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
          <button class="dropdown-item" id="btnCopyKijiji">
            <i class="bi bi-clipboard me-2"></i>Copy Kijiji text
          </button>
        </li>
        <li>
          <button class="dropdown-item" id="btnCopyCraigslist">
            <i class="bi bi-clipboard-check me-2"></i>Copy Craigslist HTML
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>

<!-- ===== Table ===== -->
<div class="container-fluid px-3 mt-3">
  <div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-inbox fs-1"></i>
    <p class="mt-2 mb-0">No items yet. Click <strong>New Item</strong> or import a CSV.</p>
  </div>

  <div class="table-responsive">
    <table id="itemTable" class="table table-hover align-middle mb-0 bg-white rounded shadow-sm">
      <thead>
        <tr>
          <th style="width:60px">Photo</th>
          <th>Name</th>
          <th>SKU</th>
          <th>Price</th>
          <th>Condition</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody id="itemTableBody"></tbody>
    </table>
  </div>
</div>

<!-- ===== Item Modal ===== -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">New Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="itemForm" novalidate>
          <div class="row g-3">

            <!-- Left column -->
            <div class="col-md-7">
              <div class="mb-3">
                <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                <input type="text" id="fieldName" class="form-control" required>
                <div class="invalid-feedback">Name is required.</div>
              </div>

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label">SKU / Item #</label>
                  <input type="text" id="fieldSku" class="form-control">
                </div>
                <div class="col-3">
                  <label class="form-label">Price ($)</label>
                  <input type="number" id="fieldPrice" class="form-control" min="0" step="0.01">
                </div>
                <div class="col-3">
                  <label class="form-label">Qty</label>
                  <input type="number" id="fieldQuantity" class="form-control" min="1" value="1">
                </div>
              </div>

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label">Condition</label>
                  <select id="fieldCondition" class="form-select">
                    <option value="">— select —</option>
                    <option>New</option>
                    <option>Like New</option>
                    <option>Good</option>
                    <option>Fair</option>
                    <option>Poor</option>
                    <option>For Parts</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label">Category</label>
                  <input type="text" id="fieldCategory" class="form-control" placeholder="e.g. Electronics">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="fieldDescription" class="form-control" rows="4" placeholder="Item details, flaws, included accessories…"></textarea>
              </div>
            </div>

            <!-- Right column — image -->
            <div class="col-md-5">
              <label class="form-label fw-semibold">Photo</label>
              <div id="imageZone" onclick="document.getElementById('imageInput').click()">
                <img id="imagePreview" class="d-none" alt="preview">
                <div id="imagePlaceholder" class="text-center text-muted">
                  <i class="bi bi-camera fs-3"></i>
                  <div class="small mt-1">Click to upload</div>
                  <div class="small text-muted">Resized to 1200 px max</div>
                </div>
              </div>
              <input type="file" id="imageInput" accept="image/*" class="d-none">
              <button type="button" id="btnRemoveImage" class="btn btn-sm btn-outline-danger mt-2 d-none">
                <i class="bi bi-trash me-1"></i>Remove photo
              </button>
            </div>

          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" id="btnDelete" class="btn btn-outline-danger me-auto d-none">
          <i class="bi bi-trash me-1"></i>Delete
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="btnSave" class="btn btn-brand">
          <i class="bi bi-check-lg me-1"></i>Save
          <span class="text-white-50 ms-1 small d-none d-md-inline">Ctrl+S</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Toast container ===== -->
<div id="toastContainer"></div>

<!-- ===== Libraries ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- ===== App modules ===== -->
<script src="js/db.js"></script>
<script src="js/core.js"></script>
<script src="js/marketplace.js"></script>
<script src="js/app.js"></script>

<!-- ===== Service worker ===== -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
